name: dock_rxnflow

# RxnFlow-compatible docking reward: 0.5*QED + 0.5*Vina_norm
# Matches RxnFlow's LIT-PCBA setup (ICLR 2025).
# NO Lipinski, NO PAINS, NO SA penalty.

target: seh

# Equal weights matching RxnFlow: R(x) = 0.5*QED + 0.5*Vina_norm
qed_weight: 0.5
dock_weight: 0.5
sa_weight: 0.0

# No hard constraints (baselines don't use them)
lipinski: false
sa_threshold: 10.0  # effectively disabled
